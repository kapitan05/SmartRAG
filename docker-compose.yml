version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    container_name: mongo_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  docling:
    image: quay.io/docling-project/docling-serve:latest
    container_name: docling_service
    ports:
      - "5001:5001"
    environment:
      - DOCLING_SERVE_ENABLE_UI=1
      - DOCLING_SERVE_MAX_SYNC_WAIT=1800
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - qdrant
      - mongodb

  ui:
    build: .                
    ports:
      - "8501:8501"         
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000/api
    command: ["uv", "run", "streamlit", "run", "src/ui/app.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
    depends_on:
      - api

volumes:
  qdrant_data:
  mongo_data: